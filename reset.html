<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>VoiceStudyFlow — Reset Password</title>
<style>
  body{margin:0;background:#0b1220;color:#eaf0ff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;display:flex;min-height:100vh;align-items:center;justify-content:center}
  .card{background:#121a2e;border:1px solid #243150;border-radius:16px;padding:28px 24px;max-width:380px;width:90%;text-align:center}
  h1{color:#5f7bf5;margin:0 0 4px;font-size:22px}
  h2{font-size:16px;font-weight:500;color:#9fb0d0;margin:0 0 20px}
  input{width:100%;box-sizing:border-box;background:#0b1220;border:1px solid #243150;border-radius:10px;padding:13px;color:#fff;font-size:15px;margin:8px 0}
  button{width:100%;background:#5f7bf5;color:#fff;border:0;border-radius:10px;padding:14px;font-size:16px;font-weight:600;margin-top:12px;cursor:pointer}
  #msg{margin-top:14px;font-size:14px;line-height:1.5;min-height:20px}
</style>
</head>
<body>
  <div class="card">
    <h1>VoiceStudyFlow</h1>
    <h2>Reset your password · إعادة تعيين كلمة المرور</h2>
    <input id="pw" type="password" placeholder="New password · كلمة المرور الجديدة" autocomplete="new-password" />
    <input id="pw2" type="password" placeholder="Confirm · تأكيد كلمة المرور" autocomplete="new-password" />
    <input id="otp" type="text" inputmode="numeric" maxlength="6" placeholder="2FA code · رمز التحقق الثنائي" autocomplete="one-time-code" style="display:none" />
    <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:#9fb0d0;margin:6px 2px;cursor:pointer">
      <input id="showpw" type="checkbox" /> Show password · إظهار كلمة المرور
    </label>
    <button id="btn">Update password · تحديث</button>
    <p id="msg"></p>
  </div>
<script type="module">
  import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
  const supabase = createClient(
    "https://jhfufoltmjhauqvgqezv.supabase.co",
    "sb_publishable_aAy9udj4VG2ZL0DS4S8pgw_dGrixZki",
    { auth: { detectSessionInUrl: true, flowType: "implicit", persistSession: false } }
  );
  const msg = document.getElementById("msg");
  let ready = false;
  supabase.auth.onAuthStateChange((_e, session) => { if (session) ready = true; });
  (async () => {
    const { data } = await supabase.auth.getSession();
    if (data.session) ready = true;
    else setTimeout(async () => { const r = await supabase.auth.getSession(); if (r.data.session) ready = true; }, 800);
  })();
  const otp = document.getElementById("otp");
  let needMfa = false;

  document.getElementById("showpw").addEventListener("change", (e) => {
    const type = e.target.checked ? "text" : "password";
    document.getElementById("pw").type = type;
    document.getElementById("pw2").type = type;
  });

  // لو الحساب مفعّل 2FA، نرفع الجلسة لـAAL2 بالتحقق من الرمز قبل تغيير كلمة المرور
  async function elevateMfa(code) {
    const { data: factors, error: fErr } = await supabase.auth.mfa.listFactors();
    if (fErr) throw fErr;
    const totp = factors && factors.totp && factors.totp[0];
    if (!totp) throw new Error("No 2FA factor found");
    const { error } = await supabase.auth.mfa.challengeAndVerify({ factorId: totp.id, code: String(code).trim() });
    if (error) throw error;
  }

  document.getElementById("btn").addEventListener("click", async () => {
    const pw = document.getElementById("pw").value;
    const pw2 = document.getElementById("pw2").value;
    if (pw.length < 6) { msg.style.color="#ffb4b4"; msg.textContent = "Password must be at least 6 characters · ٦ أحرف على الأقل"; return; }
    if (pw !== pw2) { msg.style.color="#ffb4b4"; msg.textContent = "Passwords do not match · غير متطابقة"; return; }

    // إذا طُلب رمز 2FA، تحقّق منه أولًا (يرفع الجلسة لـAAL2)
    if (needMfa) {
      const code = otp.value.trim();
      if (code.length < 6) { msg.style.color="#ffb4b4"; msg.textContent = "Enter the 6-digit code · أدخلي الرمز المكوّن من ٦ أرقام"; return; }
      msg.style.color="#9fb0d0"; msg.textContent = "Verifying… · جارٍ التحقق…";
      try { await elevateMfa(code); }
      catch (e) { msg.style.color="#ffb4b4"; msg.textContent = "Invalid code · رمز غير صحيح: " + (e.message || e); return; }
    }

    msg.style.color="#9fb0d0"; msg.textContent = "Updating… · جارٍ التحديث…";
    const { error } = await supabase.auth.updateUser({ password: pw });
    if (error) {
      // الحساب مفعّل 2FA → اطلب الرمز ثم أعد المحاولة
      if (!needMfa && /aal2|mfa|assurance/i.test(error.message || "")) {
        needMfa = true;
        otp.style.display = "block";
        otp.focus();
        msg.style.color="#9fb0d0";
        msg.textContent = "Your account uses 2FA. Enter the 6-digit code from your authenticator app, then press Update again. · حسابك يستخدم التحقق الثنائي: أدخلي الرمز من تطبيق المصادقة ثم اضغطي تحديث مرة أخرى.";
        return;
      }
      msg.style.color="#ffb4b4"; msg.textContent = "Error · خطأ: " + error.message; return;
    }
    msg.style.color="#7ee787"; msg.textContent = "✅ Password updated! Return to the app and log in. · تم التحديث! ارجعي للتطبيق وسجّلي الدخول.";
  });
</script>
</body>
</html>
